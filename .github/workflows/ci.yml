name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  quality:
    uses: trowaflo/github-actions/.github/workflows/quality.yml@fd881256daff836dd9595efd90f646c26a6deae4 # v2.0.0
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    with:
      enable_markdown_lint: true
      harden_runner_egress_policy: audit

  python:
    uses: trowaflo/github-actions/.github/workflows/python.yml@fd881256daff836dd9595efd90f646c26a6deae4 # v2.0.0
    permissions:
      contents: read
    with:
      enable_test: true
      coverage_path: custom_components/frigate_event_manager
      extra_packages: pytest-homeassistant-custom-component
      harden_runner_egress_policy: audit
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  ha:
    if: github.event_name == 'pull_request'
    uses: trowaflo/github-actions/.github/workflows/ha.yml@fd881256daff836dd9595efd90f646c26a6deae4 # v2.0.0
    permissions:
      contents: read
    with:
      enable_hacs: true
      enable_hassfest: true
      harden_runner_egress_policy: audit
