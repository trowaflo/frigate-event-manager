# https://taskfile.dev
version: "3"

tasks:
  test:
    desc: "Lance les tests Python avec couverture >=80%"
    cmds:
      - pytest --cov=custom_components/frigate_event_manager --cov-fail-under=80 tests/ -v

  test:html:
    desc: "Ouvre le rapport de couverture dans le navigateur"
    cmds:
      - pytest --cov=custom_components/frigate_event_manager --cov-report=html tests/ -q
      - open htmlcov/index.html

  lint:
    desc: "Lint Python (ruff) + Markdown (markdownlint-cli2) — mirrors CI"
    cmds:
      - ruff check .
      - markdownlint-cli2 '**/*.md' '!.venv/**'

  ci:
    desc: "Reproduit l'ensemble des checks CI en local (test + lint)"
    cmds:
      - task: test
      - task: lint

  dev:init:
    desc: "Stocke les credentials MQTT + Frigate (Keychain macOS ou dev/.env)"
    cmds:
      - cmd: |
          {{if eq OS "darwin"}}
          echo "--- Stockage des credentials dans le Keychain macOS ---"
          printf "MQTT_USERNAME: " && read USERNAME
          security add-generic-password -a frigate-event-manager -s mqtt-username -w "$USERNAME" -U
          printf "MQTT_PASSWORD: " && read -s PASSWORD && echo
          security add-generic-password -a frigate-event-manager -s mqtt-password -w "$PASSWORD" -U
          printf "FRIGATE_USER: " && read FUSER
          security add-generic-password -a frigate-event-manager -s frigate-user -w "$FUSER" -U
          printf "FRIGATE_PASSWORD: " && read -s FPASSWORD && echo
          security add-generic-password -a frigate-event-manager -s frigate-password -w "$FPASSWORD" -U
          echo "Credentials stockés dans le Keychain macOS"
          {{else}}
          echo "--- Stockage des credentials dans dev/.env ---"
          mkdir -p dev
          printf "MQTT_USERNAME: " && read USERNAME
          printf "MQTT_PASSWORD: " && read -s PASSWORD && echo
          printf "FRIGATE_USER: " && read FUSER
          printf "FRIGATE_PASSWORD: " && read -s FPASSWORD && echo
          printf "MQTT_USERNAME='%s'\nMQTT_PASSWORD='%s'\nFRIGATE_USER='%s'\nFRIGATE_PASSWORD='%s'\n" \
            "$USERNAME" "$PASSWORD" "$FUSER" "$FPASSWORD" > dev/.env
          chmod 600 dev/.env
          echo "Credentials stockés dans dev/.env (chmod 600)"
          {{end}}
    silent: true

  dev:clean:
    desc: "Supprime les credentials stockés (Keychain ou dev/.env)"
    cmds:
      - cmd: |
          {{if eq OS "darwin"}}
          security delete-generic-password -a frigate-event-manager -s mqtt-username 2>/dev/null || true
          security delete-generic-password -a frigate-event-manager -s mqtt-password 2>/dev/null || true
          security delete-generic-password -a frigate-event-manager -s frigate-user 2>/dev/null || true
          security delete-generic-password -a frigate-event-manager -s frigate-password 2>/dev/null || true
          echo "Credentials supprimés du Keychain"
          {{else}}
          rm -f dev/.env
          echo "dev/.env supprimé"
          {{end}}
    silent: true

  dev:replay:
    desc: "Récupère le dernier review Frigate réel et le republie en MQTT"
    cmds:
      - cmd: |
          {{if eq OS "darwin"}}
          FRIGATE_USER=$(security find-generic-password -a frigate-event-manager -s frigate-user -w)
          FRIGATE_PASSWORD=$(security find-generic-password -a frigate-event-manager -s frigate-password -w)
          MQTT_USERNAME=$(security find-generic-password -a frigate-event-manager -s mqtt-username -w)
          MQTT_PASSWORD=$(security find-generic-password -a frigate-event-manager -s mqtt-password -w)
          {{else}}
          set -a && . dev/.env && set +a
          {{end}}

          COOKIE_JAR=$(mktemp)
          echo "Login Frigate..."
          curl -s -c "$COOKIE_JAR" 'https://frigate.trowa-family.ovh/api/login' \
            -H 'Content-Type: application/json' \
            -d "{\"user\": \"$FRIGATE_USER\", \"password\": \"$FRIGATE_PASSWORD\"}"

          echo ""
          echo "Récupération du dernier review..."
          REVIEW=$(curl -s -b "$COOKIE_JAR" 'https://frigate.trowa-family.ovh/api/review?limit=1')
          rm -f "$COOKIE_JAR"

          echo "Review récupéré :"
          echo "$REVIEW" | python3 -m json.tool 2>/dev/null || echo "$REVIEW"

          PAYLOAD=$(echo "$REVIEW" | python3 -c "
          import json, sys
          reviews = json.load(sys.stdin)
          if not reviews:
              print('Aucun review trouvé', file=sys.stderr)
              sys.exit(1)
          r = reviews[0]
          data = r.get('data', {})
          payload = {
              'type': 'new',
              'after': {
                  'id': r['id'],
                  'camera': r['camera'],
                  'start_time': r['start_time'],
                  'end_time': r.get('end_time'),
                  'severity': r['severity'],
                  'thumb_path': r.get('thumb_path', ''),
                  'objects': data.get('objects', []),
                  'current_zones': data.get('zones', []),
                  'score': data.get('top_score', 0.0),
                  'data': {
                      'detections': data.get('detections', []),
                      'objects': data.get('objects', []),
                      'zones': data.get('zones', []),
                      'top_score': data.get('top_score', 0.0),
                  },
              }
          }
          print(json.dumps(payload))
          ")

          echo ""
          echo "Publication MQTT sur frigate/reviews..."
          echo "$PAYLOAD" | python3 -m json.tool 2>/dev/null

          echo "$PAYLOAD" | mosquitto_pub \
            -h mosquitto.trowa-family.ovh -p 1883 \
            -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD" \
            -t "frigate/reviews" -s

          echo ""
          echo "Review republié — le coordinator devrait logger la réception."
    silent: true

  deploy:init:
    desc: "Stocke l'hôte SSH Home Assistant (Keychain macOS ou dev/.env)"
    cmds:
      - cmd: |
          {{if eq OS "darwin"}}
          printf "HA_HOST (ex: homeassistant.local ou IP): " && read HA_HOST
          security add-generic-password -a frigate-event-manager -s ha-host -w "$HA_HOST" -U
          echo "HA_HOST stocké dans le Keychain macOS"
          {{else}}
          printf "HA_HOST (ex: homeassistant.local ou IP): " && read HA_HOST
          mkdir -p dev
          grep -v '^HA_HOST=' dev/.env 2>/dev/null > dev/.env.tmp || true
          echo "HA_HOST='$HA_HOST'" >> dev/.env.tmp
          mv dev/.env.tmp dev/.env
          chmod 600 dev/.env
          echo "HA_HOST stocké dans dev/.env"
          {{end}}
    silent: true

  deploy:
    desc: "Déploie l'intégration sur Home Assistant via SSH (nécessite deploy:init)"
    cmds:
      - cmd: |
          {{if eq OS "darwin"}}
          HA_HOST=$(security find-generic-password -a frigate-event-manager -s ha-host -w 2>/dev/null)
          {{else}}
          set -a && . dev/.env && set +a
          {{end}}

          if [ -z "$HA_HOST" ]; then
            echo "HA_HOST non configuré — lance d'abord: task deploy:init"
            exit 1
          fi

          echo "Copie vers $HA_HOST..."
          tar -czf - -C ./custom_components frigate_event_manager \
            | ssh root@"$HA_HOST" "rm -rf /config/custom_components/frigate_event_manager && tar -xzf - -C /config/custom_components/"

          echo "Redémarrage HA Core..."
          ssh root@"$HA_HOST" "ha core restart"
          echo "Déploiement terminé."
    silent: true
