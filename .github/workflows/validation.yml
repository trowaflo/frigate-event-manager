name: PR Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

jobs:
  python:
    uses: trowaflo/github-actions/.github/workflows/ha-integration.yml@70a08a732791ce4af219f4edf4cabb92f96900e9 # main
    with:
      component_name: frigate_event_manager

  markdown:
    if: github.event_name == 'pull_request'
    uses: trowaflo/github-actions/.github/workflows/lint-markdown.yml@70a08a732791ce4af219f4edf4cabb92f96900e9 # main

  # kics temporarily disabled — supply chain attack on checkmarx/kics-github-action (2026-03-23)
  # Re-enable once Checkmarx confirms the action is safe and the SHA is verified
  # kics:
  #   if: github.event_name == 'pull_request'
  #   uses: trowaflo/github-actions/.github/workflows/kics.yml@main
