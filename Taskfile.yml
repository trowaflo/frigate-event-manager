version: "3"

tasks:
  test:
    desc: Lance tous les tests
    cmds:
      - go test -v ./...

  dev:
    desc: Lance l'addon (SUPERVISOR_TOKEN fourni par le devcontainer HA)
    cmds:
      - cmd: |
          export CONFIG_PATH=dev/config.json
          exec go run ./cmd/addon

  dev:init:
    desc: Stocke les credentials MQTT dans le Keychain macOS (hors devcontainer)
    cmds:
      - cmd: |
          echo "--- Stockage des credentials MQTT dans le Keychain ---"
          printf "MQTT_USERNAME: " && read USERNAME
          security add-generic-password -a frigate-event-manager -s mqtt-username -w "$USERNAME" -U
          printf "MQTT_PASSWORD: " && read -s PASSWORD && echo
          security add-generic-password -a frigate-event-manager -s mqtt-password -w "$PASSWORD" -U
          echo "✅ Credentials MQTT stockés dans le Keychain macOS"
    silent: true

  dev:clean:
    desc: Supprime les credentials MQTT du Keychain
    cmds:
      - security delete-generic-password -a frigate-event-manager -s mqtt-username 2>/dev/null || true
      - security delete-generic-password -a frigate-event-manager -s mqtt-password 2>/dev/null || true
      - echo "✅ Credentials supprimés du Keychain"
    silent: true

  build:
    desc: Build l'image Docker en local
    cmds:
      - docker build -t frigate-event-manager:dev .

  build:multi:
    desc: Build multi-arch (nécessite docker buildx)
    cmds:
      - docker buildx build --platform linux/amd64,linux/arm64 -t frigate-event-manager:dev .
