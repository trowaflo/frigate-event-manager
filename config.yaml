name: Frigate Event Manager
description: Notifications intelligentes pour les événements Frigate
version: 0.0.0 # x-release-please-version
slug: frigate-event-manager
url: https://github.com/trowaflo/frigate-event-manager
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
map:
  - config:ro
options:
  mqtt_broker_url: ""
  mqtt_topic: frigate/reviews
  mqtt_client_id: frigate-event-manager
  severity_filter:
    - alert
  cooldown: 30
  debounce: 5
  notify_service: ""
schema:
  mqtt_broker_url: str
  mqtt_topic: str?
  mqtt_client_id: str?
  mqtt_username: str?
  mqtt_password: password?
  notify_service: str?
  severity_filter:
    - str
  cameras:
    - str?
  cooldown: int?
  debounce: int?
