name: PR Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write

jobs:
  python:
    uses: trowaflo/github-actions/.github/workflows/ha-integration.yml@d51fc48891c455f85a902e3d23f8ac7a52ef273e # main
    with:
      component_name: frigate_event_manager
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  markdown:
    if: github.event_name == 'pull_request'
    uses: trowaflo/github-actions/.github/workflows/lint-markdown.yml@d51fc48891c455f85a902e3d23f8ac7a52ef273e # main

  # kics temporarily disabled — supply chain attack on checkmarx/kics-github-action (2026-03-23)
  # Re-enable once Checkmarx confirms the action is safe and the SHA is verified
  # kics:
  #   if: github.event_name == 'pull_request'
  #   uses: trowaflo/github-actions/.github/workflows/kics.yml@main
